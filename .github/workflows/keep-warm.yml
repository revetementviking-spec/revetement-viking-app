name: Keep warm

# Pinge l'endpoint de réchauffement pour éviter les démarrages à froid de la
# fonction serverless (~1,7 s sinon à la première ouverture après une pause).
# GitHub planifie au mieux toutes les 5 min (peut décaler en période de charge).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/ping
        run: |
          for i in 1 2; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 https://app.revetementviking.com/api/ping || true)
            echo "Ping #$i → HTTP $code"
            sleep 5
          done
