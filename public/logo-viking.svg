<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#1e3a5f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Drapeau au sommet du mât -->
  <path d="M100 25 L120 30 L100 38 Z" fill="#1e3a5f" stroke="none"/>
  <line x1="100" y1="22" x2="100" y2="135" stroke-width="2.5"/>
  <!-- Vergue (barre horizontale en haut de voile) -->
  <line x1="62" y1="55" x2="138" y2="55" stroke-width="2.5"/>
  <!-- Voile carrée bleu marine pleine -->
  <path d="M70 55 L130 55 L130 120 L70 120 Z" fill="#1e3a5f" stroke="none"/>
  <!-- Cordages diagonaux -->
  <line x1="70" y1="55" x2="40" y2="115" stroke-width="1.5"/>
  <line x1="130" y1="55" x2="160" y2="115" stroke-width="1.5"/>
  <!-- Coque principale du drakkar -->
  <path d="M28 132 Q30 130 35 130 L165 130 Q170 130 172 132 L160 165 Q150 172 130 173 L70 173 Q50 172 40 165 Z" fill="none" stroke-width="3.5"/>
  <!-- Lignes horizontales coque (planches) -->
  <line x1="50" y1="148" x2="150" y2="148" stroke-width="1.5"/>
  <line x1="55" y1="158" x2="145" y2="158" stroke-width="1.5"/>
  <!-- Boucliers ronds entre les lignes -->
  <g stroke-width="1">
    <line x1="60" y1="153" x2="60" y2="158"/>
    <line x1="72" y1="153" x2="72" y2="158"/>
    <line x1="84" y1="153" x2="84" y2="158"/>
    <line x1="96" y1="153" x2="96" y2="158"/>
    <line x1="108" y1="153" x2="108" y2="158"/>
    <line x1="120" y1="153" x2="120" y2="158"/>
    <line x1="132" y1="153" x2="132" y2="158"/>
  </g>
  <!-- Tête de dragon à l'avant (côté droit) -->
  <path d="M168 130 Q180 128 184 120 L188 118 L184 124 Q183 128 178 131 Z" fill="#1e3a5f" stroke="none"/>
  <path d="M186 117 L192 115 L188 122 Z" fill="#1e3a5f" stroke="none"/>
  <!-- Queue arrière (côté gauche, recourbée) -->
  <path d="M32 130 Q22 128 18 120 Q14 113 22 113 Q20 118 26 124 Z" fill="#1e3a5f" stroke="none"/>
</svg>
